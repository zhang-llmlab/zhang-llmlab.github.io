<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" font-family="Arial, sans-serif">
  <defs>
    <style>
      .axis { stroke: #333; stroke-width: 1.5; fill: none; }
      .grid { stroke: #e0e0e0; stroke-width: 0.5; }
      .classA { fill: #e74c3c; stroke: #c0392b; stroke-width: 1.5; }
      .classB { fill: #3498db; stroke: #2874a6; stroke-width: 1.5; }
      .query { fill: #2ecc71; stroke: #196f3d; stroke-width: 2; }
      .neighbor-line { stroke: #7f8c8d; stroke-width: 1; stroke-dasharray: 4 3; }
      .circle-k3 { fill: none; stroke: #f39c12; stroke-width: 2; stroke-dasharray: 5 3; }
      .label { font-size: 13px; fill: #2c3e50; }
      .title { font-size: 16px; font-weight: bold; fill: #2c3e50; }
    </style>
  </defs>

  <text x="250" y="25" text-anchor="middle" class="title">KNN 分类直观示意 (K=3)</text>

  <!-- Grid -->
  <g class="grid">
    <line x1="60" y1="60" x2="60" y2="360"/>
    <line x1="60" y1="360" x2="460" y2="360"/>
    <line x1="140" y1="60" x2="140" y2="360"/>
    <line x1="220" y1="60" x2="220" y2="360"/>
    <line x1="300" y1="60" x2="300" y2="360"/>
    <line x1="380" y1="60" x2="380" y2="360"/>
    <line x1="460" y1="60" x2="460" y2="360"/>
    <line x1="60" y1="120" x2="460" y2="120"/>
    <line x1="60" y1="180" x2="460" y2="180"/>
    <line x1="60" y1="240" x2="460" y2="240"/>
    <line x1="60" y1="300" x2="460" y2="300"/>
  </g>

  <!-- Axes -->
  <line x1="60" y1="360" x2="460" y2="360" class="axis"/>
  <line x1="60" y1="60" x2="60" y2="360" class="axis"/>
  <text x="260" y="385" text-anchor="middle" class="label">特征 X₁</text>
  <text x="30" y="210" text-anchor="middle" class="label" transform="rotate(-90 30 210)">特征 X₂</text>

  <!-- Circle around K=3 neighbors of query point (centered ~ (270, 220)) -->
  <circle cx="270" cy="220" r="70" class="circle-k3"/>
  <text x="330" y="160" class="label" fill="#f39c12" font-weight="bold">K=3 邻域</text>

  <!-- Class A (red circles) -->
  <circle cx="120" cy="100" r="8" class="classA"/>
  <circle cx="170" cy="140" r="8" class="classA"/>
  <circle cx="230" cy="180" r="8" class="classA"/>
  <circle cx="290" cy="170" r="8" class="classA"/>
  <circle cx="330" cy="230" r="8" class="classA"/>
  <circle cx="200" cy="90" r="8" class="classA"/>
  <circle cx="260" cy="120" r="8" class="classA"/>

  <!-- Class B (blue squares) -->
  <rect x="332" y="272" width="16" height="16" class="classB"/>
  <rect x="380" y="300" width="16" height="16" class="classB"/>
  <rect x="220" y="310" width="16" height="16" class="classB"/>
  <rect x="150" y="290" width="16" height="16" class="classB"/>
  <rect x="290" y="330" width="16" height="16" class="classB"/>
  <rect x="410" y="240" width="16" height="16" class="classB"/>
  <rect x="90" y="230" width="16" height="16" class="classB"/>

  <!-- Query point (green triangle) -->
  <polygon points="270,208 260,228 280,228" class="query"/>

  <!-- Lines to 3 nearest neighbors -->
  <line x1="270" y1="220" x2="290" y2="170" class="neighbor-line"/>
  <line x1="270" y1="220" x2="330" y2="230" class="neighbor-line"/>
  <line x1="270" y1="220" x2="340" y2="280" class="neighbor-line"/>

  <!-- Legend -->
  <g transform="translate(70, 45)">
    <circle cx="10" cy="0" r="6" class="classA"/>
    <text x="22" y="4" class="label">类别 A</text>
    <rect x="80" y="-6" width="12" height="12" class="classB"/>
    <text x="98" y="4" class="label">类别 B</text>
    <polygon points="180,-8 173,6 187,6" class="query"/>
    <text x="195" y="4" class="label">待预测样本</text>
  </g>

  <!-- Vote result -->
  <text x="270" y="255" text-anchor="middle" class="label" font-weight="bold">2 红 vs 1 蓝 → 预测为 A</text>
</svg>
