<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="Arial, sans-serif">
  <defs>
    <style>
      .axis { stroke: #333; stroke-width: 1.5; }
      .grid { stroke: #eee; stroke-width: 0.5; }
      .pt { fill: #34495e; }
      .euc { stroke: #e74c3c; stroke-width: 2.5; fill: none; }
      .man { stroke: #2980b9; stroke-width: 2.5; fill: none; }
      .che { stroke: #27ae60; stroke-width: 2.5; fill: none; }
      .label { font-size: 12px; fill: #2c3e50; }
      .title { font-size: 14px; font-weight: bold; fill: #2c3e50; }
    </style>
  </defs>

  <!-- Panel 1: Euclidean -->
  <g transform="translate(0,0)">
    <text x="120" y="20" text-anchor="middle" class="title">欧氏距离 (Euclidean)</text>
    <g class="grid">
      <line x1="30" y1="50" x2="210" y2="50"/>
      <line x1="30" y1="90" x2="210" y2="90"/>
      <line x1="30" y1="130" x2="210" y2="130"/>
      <line x1="30" y1="170" x2="210" y2="170"/>
      <line x1="30" y1="210" x2="210" y2="210"/>
      <line x1="30" y1="250" x2="210" y2="250"/>
      <line x1="30" y1="50" x2="30" y2="250"/>
      <line x1="70" y1="50" x2="70" y2="250"/>
      <line x1="110" y1="50" x2="110" y2="250"/>
      <line x1="150" y1="50" x2="150" y2="250"/>
      <line x1="190" y1="50" x2="190" y2="250"/>
    </g>
    <line x1="70" y1="210" x2="190" y2="90" class="euc"/>
    <circle cx="70" cy="210" r="6" class="pt"/>
    <circle cx="190" cy="90" r="6" class="pt"/>
    <text x="60" y="230" class="label">A</text>
    <text x="195" y="80" class="label">B</text>
    <text x="120" y="280" text-anchor="middle" class="label" fill="#c0392b">√((x₁-x₂)² + (y₁-y₂)²)</text>
  </g>

  <!-- Panel 2: Manhattan -->
  <g transform="translate(240,0)">
    <text x="120" y="20" text-anchor="middle" class="title">曼哈顿距离 (Manhattan)</text>
    <g class="grid">
      <line x1="30" y1="50" x2="210" y2="50"/>
      <line x1="30" y1="90" x2="210" y2="90"/>
      <line x1="30" y1="130" x2="210" y2="130"/>
      <line x1="30" y1="170" x2="210" y2="170"/>
      <line x1="30" y1="210" x2="210" y2="210"/>
      <line x1="30" y1="250" x2="210" y2="250"/>
      <line x1="30" y1="50" x2="30" y2="250"/>
      <line x1="70" y1="50" x2="70" y2="250"/>
      <line x1="110" y1="50" x2="110" y2="250"/>
      <line x1="150" y1="50" x2="150" y2="250"/>
      <line x1="190" y1="50" x2="190" y2="250"/>
    </g>
    <polyline points="70,210 70,90 190,90" class="man"/>
    <polyline points="70,210 190,210 190,90" class="man" stroke-dasharray="4 3"/>
    <circle cx="70" cy="210" r="6" class="pt"/>
    <circle cx="190" cy="90" r="6" class="pt"/>
    <text x="60" y="230" class="label">A</text>
    <text x="195" y="80" class="label">B</text>
    <text x="120" y="280" text-anchor="middle" class="label" fill="#2874a6">|x₁-x₂| + |y₁-y₂|</text>
  </g>

  <!-- Panel 3: Chebyshev -->
  <g transform="translate(480,0)">
    <text x="120" y="20" text-anchor="middle" class="title">切比雪夫距离 (Chebyshev)</text>
    <g class="grid">
      <line x1="30" y1="50" x2="210" y2="50"/>
      <line x1="30" y1="90" x2="210" y2="90"/>
      <line x1="30" y1="130" x2="210" y2="130"/>
      <line x1="30" y1="170" x2="210" y2="170"/>
      <line x1="30" y1="210" x2="210" y2="210"/>
      <line x1="30" y1="250" x2="210" y2="250"/>
      <line x1="30" y1="50" x2="30" y2="250"/>
      <line x1="70" y1="50" x2="70" y2="250"/>
      <line x1="110" y1="50" x2="110" y2="250"/>
      <line x1="150" y1="50" x2="150" y2="250"/>
      <line x1="190" y1="50" x2="190" y2="250"/>
    </g>
    <rect x="70" y="90" width="120" height="120" fill="none" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="3 3"/>
    <line x1="70" y1="210" x2="190" y2="90" class="che"/>
    <circle cx="70" cy="210" r="6" class="pt"/>
    <circle cx="190" cy="90" r="6" class="pt"/>
    <text x="60" y="230" class="label">A</text>
    <text x="195" y="80" class="label">B</text>
    <text x="120" y="280" text-anchor="middle" class="label" fill="#1e8449">max(|x₁-x₂|, |y₁-y₂|)</text>
  </g>
</svg>
